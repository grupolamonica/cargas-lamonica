<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 36" fill="none">
  <!-- Shopping bag icon -->
  <g transform="translate(2, 2)">
    <rect x="0" y="11" width="20" height="14" rx="1.5" fill="#EE4D2D"/>
    <path d="M4 11 C4 6 16 6 16 11" fill="none" stroke="#EE4D2D" stroke-width="2.2" stroke-linecap="round"/>
    <rect x="2" y="13" width="16" height="10" rx="1" fill="#EE4D2D"/>
    <path d="M4 11 C4 6.5 16 6.5 16 11" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <rect x="0" y="11" width="20" height="14" rx="1.5" fill="none" stroke="#EE4D2D" stroke-width="0"/>
    <!-- bag body -->
    <rect x="1" y="12" width="18" height="12" rx="1" fill="#EE4D2D"/>
    <text x="10" y="21.5" font-family="Arial,Helvetica,sans-serif" font-size="8" font-weight="900" fill="white" text-anchor="middle">S</text>
  </g>
  <!-- Shopee wordmark -->
  <text x="28" y="25" font-family="'Arial Rounded MT Bold','Arial Black','Arial',Helvetica,sans-serif" font-size="18" font-weight="800" fill="#EE4D2D" letter-spacing="-0.3">Shopee</text>
