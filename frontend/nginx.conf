server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Cache-busted assets (Vite outputs hashed filenames: *.js, *.css with hash in name)
    # Match assets/ directory which Vite writes all chunks/styles into
    location ~* ^/assets/.*\.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html — never cache, always revalidate (SPA entry point)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # SPA fallback — all unmatched routes serve index.html
    # Note: /api/* and /health are routed directly to backend by Traefik (never reach this nginx)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files (e.g. .env)
    location ~ /\. {
        deny all;
    }
}
