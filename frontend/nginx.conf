server {
    # HTTP/2 ativo (multiplexing + header compression) — reduz round-trips em
    # SPA com muitos chunks de Vite. Traefik termina TLS upstream; aqui é HTTP
    # cleartext interno + HTTP/2 cleartext (h2c) suportado pelo nginx:alpine.
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Performance defaults ────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;

    # ── Compression ─────────────────────────────────────────────────────────
    # gzip_min_length 256 (era 1024) — comprime index.html (~5KB), vendor
    # chunks pequenos e respostas pequenas onde o ganho relativo é alto.
    # comp_level 6 é o sweet spot CPU/razão (default).
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml
        font/ttf
        font/otf;

    # ── Static assets (Vite hashed filenames) — immutable cache 1y ─────────
    location ~* ^/assets/.*\.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off; # reduz IO em assets estáticos
        try_files $uri =404;
    }

    # ── index.html — never cache (SPA entry) ───────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # ── Favicon / robots — long-cache públicos, log off ─────────────────────
    location = /favicon.ico {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        log_not_found off;
    }
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # ── SPA fallback ────────────────────────────────────────────────────────
    # /api/* e /health são roteados ao backend pelo Traefik — nunca chegam aqui.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
