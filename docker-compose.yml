# docker-compose.yml — Lamonica Cargas production stack
# Routing handled by platform-level Traefik (platform_public network).
# No embedded reverse proxy here.
#
# IP-only mode (no domain): PathPrefix-based routing
# Domain mode: set DOMAIN env var, labels below auto-activate HTTPS routers.

services:

  # ── Frontend (nginx:alpine serving Vite dist) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_SUPABASE_URL: ""
        VITE_SUPABASE_PUBLISHABLE_KEY: ""
    image: lamonica-frontend:latest
    restart: unless-stopped
    networks:
      - lamonica-net
      - platform_public
    # Resource caps — nginx é leve; limites previnem que um runaway tome o host
    mem_limit: 256m
    mem_reservation: 64m
    cpus: 0.50
    # Rotação de logs — sem isso json-file enche disco em runaway
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=platform_public"
      # IP routing (no domain) — catch-all, lowest priority
      - "traefik.http.routers.lmc-frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.lmc-frontend.entrypoints=web"
      - "traefik.http.routers.lmc-frontend.priority=1"
      - "traefik.http.services.lmc-frontend.loadbalancer.server.port=80"
      # Compression no edge — Traefik recompõe gzip/brotli antes do cliente.
      # Mesmo que o nginx interno já comprima, o middleware é idempotente e
      # cobre respostas vindas do backend (api/*) que não passam pelo nginx.
      - "traefik.http.middlewares.lmc-compress.compress=true"
      - "traefik.http.routers.lmc-frontend.middlewares=lmc-compress"
    depends_on:
      backend:
        condition: service_healthy

  # ── Backend (Express on port 3001) ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: lamonica-backend:latest
    restart: unless-stopped
    networks:
      - lamonica-net
      - platform_public
      - platform_monitoring
    env_file:
      - backend.env
    environment:
      NODE_ENV: production
      PORT: "3001"
    # Permite o container alcançar serviços publicados no HOST do VPS — usado quando
    # BRK_BASE_URL aponta para um túnel reverso SSH do SERVERBD (que publica o :5010
    # do BRK no host, ex.: http://host.docker.internal:5011). Benigno se não usado.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Node ~80-200MB típico + pool pg conexões; sheet sync ETL pode subir.
    # 768m com reserve 256m dá folga sem permitir leak indefinido.
    mem_limit: 768m
    mem_reservation: 256m
    cpus: 1.50
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      # ?deep=1 → executa SELECT 1 contra pg; ?deep=0 (default) é shallow ~1ms.
      # Deep no docker healthcheck garante que falha de conexão é detectada
      # cedo, sem custo (apenas 1 query/30s).
      test: ["CMD", "curl", "-fs", "http://localhost:3001/health?deep=1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=platform_public"
      # /api/* and /health — higher priority wins over frontend catch-all
      - "traefik.http.routers.lmc-backend.rule=PathPrefix(`/api`) || Path(`/health`)"
      - "traefik.http.routers.lmc-backend.entrypoints=web"
      - "traefik.http.routers.lmc-backend.priority=10"
      - "traefik.http.services.lmc-backend.loadbalancer.server.port=3001"
      # ── Rate limiting (defesa contra burst / scraping / brute-force) ───────
      # average=100 req/s sustained, burst=200 instantâneo por origem IP.
      # Calibrado para 50-100 operadores ativos + portal motorista; ajustar
      # via override em produção se KPI mudar.
      - "traefik.http.middlewares.lmc-backend-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.lmc-backend-ratelimit.ratelimit.burst=200"
      - "traefik.http.middlewares.lmc-backend-ratelimit.ratelimit.period=1s"
      - "traefik.http.middlewares.lmc-backend-ratelimit.ratelimit.sourcecriterion.ipstrategy.depth=1"
      # Compression + ratelimit no mesmo chain (ordem importa: ratelimit antes)
      - "traefik.http.routers.lmc-backend.middlewares=lmc-backend-ratelimit,lmc-compress"

  # ── Cadastro-OCR (FastAPI Python — OCR + consultas externas) ────────────
  cadastro-ocr:
    build:
      context: ./cadastro-motorista/backend
      dockerfile: Dockerfile
    image: lamonica-cadastro-ocr:latest
    restart: unless-stopped
    networks:
      - lamonica-net
      - platform_public
    # Sidecar OCR — chamadas externas (Infosimples/GPT-4o Vision) + PDF parse
    # podem consumir RAM em rajadas. 768m cobre processamento concorrente
    # sem permitir leak indefinido.
    mem_limit: 768m
    mem_reservation: 192m
    cpus: 1.00
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      INFOSIMPLES_TOKEN: ${INFOSIMPLES_TOKEN:-}
      # Fase 3 (2026-05-21): OCR_COMPROVANTE_PROVIDER e OCR_CARTAO_CNPJ_PROVIDER
      # removidos (EasyOCR foi descomissionado). Strategy por endpoint abaixo.
      # GPT-4o Vision (Fase 2 da migracao OCR — vide docs/lgpd-openai-processor.md)
      # OPENAI_API_KEY vem via secret (NUNCA hardcoded). Defaults preservam
      # comportamento atual ate consent screen + DPA estarem em ordem.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GPT4O_VISION_MODEL: ${GPT4O_VISION_MODEL:-gpt-4o}
      GPT4O_VISION_TIMEOUT_SECONDS: ${GPT4O_VISION_TIMEOUT_SECONDS:-30}
      GPT4O_VISION_MAX_RETRIES: ${GPT4O_VISION_MAX_RETRIES:-2}
      GPT4O_DAILY_BUDGET_USD: ${GPT4O_DAILY_BUDGET_USD:-25.0}
      # Strategy por endpoint (legacy | infosimples-with-vision-fallback | vision-only)
      OCR_CNH_STRATEGY: ${OCR_CNH_STRATEGY:-legacy}
      OCR_CRLV_STRATEGY: ${OCR_CRLV_STRATEGY:-legacy}
      # cartao-CNPJ e comprovante: Infosimples (legacy) genérico não lê bem esses
      # documentos → default vision-only (GPT-4o). O cartão-CNPJ ainda é
      # complementado com a consulta autoritativa da Receita (ver
      # _enrich_cartao_cnpj_com_receita). Precisa do OPENAI_API_KEY no sidecar.
      OCR_CARTAO_CNPJ_STRATEGY: ${OCR_CARTAO_CNPJ_STRATEGY:-vision-only}
      OCR_RNTRC_STRATEGY: ${OCR_RNTRC_STRATEGY:-vision-only}
      OCR_COMPROVANTE_STRATEGY: ${OCR_COMPROVANTE_STRATEGY:-vision-only}
      OCR_SELFIE_CNH_STRATEGY: ${OCR_SELFIE_CNH_STRATEGY:-vision-only}
      # bind 0.0.0.0 em prod: Traefik (outro container) precisa alcancar uvicorn
      # via network platform_public. Default do app e 127.0.0.1 (loopback-only).
      # Em dev o override.yml ja injeta o mesmo HOST.
      HOST: "0.0.0.0"
    volumes:
      - cadastro_anexos:/app/backend/anexos_tmp
    # Não expõe porta externamente — Traefik roteia /ocr-api/* para este container
    expose:
      - "8765"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=platform_public"
      - "traefik.http.routers.lmc-cadastro-ocr.rule=PathPrefix(`/ocr-api`)"
      - "traefik.http.routers.lmc-cadastro-ocr.entrypoints=web"
      - "traefik.http.routers.lmc-cadastro-ocr.priority=20"
      - "traefik.http.middlewares.lmc-ocr-strip.stripprefix.prefixes=/ocr-api"
      - "traefik.http.routers.lmc-cadastro-ocr.middlewares=lmc-ocr-strip"
      - "traefik.http.services.lmc-cadastro-ocr.loadbalancer.server.port=8765"

  # ── Angellira bot (sidecar FastAPI :8765) ────────────────────────────────
  # Cadastra motorista/proprietario/veiculo no AngelLira via API publica.
  # Sem acesso externo (Traefik) — chamado apenas pelo backend Node via
  # rede privada lamonica-net (http://angelira-bot:8765).
  # Epic DC-111 / Sprint 1 / DC-113.
  angelira-bot:
    build:
      context: ./bots/angelira
      dockerfile: Dockerfile
    image: lamonica-angelira-bot:latest
    restart: unless-stopped
    networks:
      - lamonica-net
    # Le credenciais do mesmo backend.env do backend Node (ANGELLIRA_USER,
    # ANGELLIRA_PASSWORD, ANGELLIRA_EMPRESA_ID — auth.py do bot ja aceita
    # esses aliases com 2 Ls).
    env_file:
      - backend.env
    environment:
      ANGELIRA_AUTH_BASE: ${ANGELIRA_AUTH_BASE:-https://auth.angellira.com.br}
      ANGELIRA_API_BASE: ${ANGELIRA_API_BASE:-https://api.angellira.com.br/profile}
      ANGELIRA_PRECHECK_DIAS: ${ANGELIRA_PRECHECK_DIAS:-365}
      # CORS aberto pra o backend interno; sem exposicao externa o risco e baixo
      CORS_ORIGINS: ${ANGELIRA_BOT_CORS_ORIGINS:-http://backend:3001,http://localhost:5010,http://127.0.0.1:5010}
      HOST: "0.0.0.0"
      PORT: "8765"
      PYTHONUNBUFFERED: "1"
    # Cliente HTTP simples — sem Selenium, footprint baixo.
    mem_limit: 256m
    mem_reservation: 64m
    cpus: 0.50
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # /api/status retorna 200 mesmo sem creds; basta o uvicorn responder.
      test: ["CMD", "curl", "-fs", "http://localhost:8765/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    expose:
      - "8765"

  # ── Unificada bot (sidecar FastAPI :8001) ────────────────────────────────
  # Gera Risk Assessment Document (PDF unificado) via ReportLab a partir da
  # API Angellira. Reusa o JWT do mesmo usuario (ANGELIRA_API_*).
  # Epic DC-111 / Sprint 1 / DC-113.
  unificada-bot:
    build:
      context: ./bots/unificada
      dockerfile: Dockerfile
    image: lamonica-unificada-bot:latest
    restart: unless-stopped
    networks:
      - lamonica-net
    # Mesma fonte do backend.env (ANGELLIRA_USER/PASSWORD/EMPRESA_ID).
    env_file:
      - backend.env
    environment:
      ANGELIRA_AUTH_BASE: ${ANGELIRA_AUTH_BASE:-https://auth.angellira.com.br}
      UNIFICADA_HOST: "0.0.0.0"
      UNIFICADA_PORT: "8001"
      PYTHONUNBUFFERED: "1"
    # ReportLab + svglib podem subir picos em PDFs grandes; 384m cobre.
    mem_limit: 384m
    mem_reservation: 96m
    cpus: 0.50
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    expose:
      - "8001"

  # ── Coletor Nestlé (Galileu TMS → nestle_ofertas/nestle_embarques) ────────
  # Worker em loop (run_coleta.py): coleta ofertas/embarques da Nestlé no
  # Galileo e grava nas tabelas nestle_*. Alimenta a fonte Nestlé da tela
  # Programação (equivalente às viagens SPX da Shopee). Não expõe HTTP.
  # Lê SUPABASE_URL/SUPABASE_SERVICE_ROLE_KEY + GALILEU_URL/USER/PASSWORD do backend.env.
  galileu-bot:
    build:
      context: ./bots/galileu
      dockerfile: Dockerfile
    image: lamonica-galileu-bot:latest
    restart: unless-stopped
    networks:
      - lamonica-net
    env_file:
      - backend.env
    environment:
      # Cadência da coleta (segundos); mínimo efetivo 15s (guard no run_coleta).
      NESTLE_COLETA_INTERVAL_SEC: ${NESTLE_COLETA_INTERVAL_SEC:-120}
      PYTHONUNBUFFERED: "1"
    mem_limit: 256m
    mem_reservation: 64m
    cpus: 0.50
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── SPX bot (sidecar FastAPI :8766) ──────────────────────────────────────
  # Cadastra motorista no portal SPX (Shopee Express) via API privada.
  # Cookies SSO vêm de aspx_credentials.cookies_json no Supabase (renovados
  # pelo container aspx-renewal a cada 4 dias via Playwright).
  # Sem acesso externo (Traefik) — chamado pelo backend Node.
  # Epic DC-111 / Sprint 1 extensão SPX.
  spx-bot:
    build:
      context: ./bots/spx
      dockerfile: Dockerfile
    image: lamonica-spx-bot:latest
    restart: unless-stopped
    networks:
      - lamonica-net
    # Le SUPABASE_URL/SUPABASE_SERVICE_ROLE_KEY do backend.env (mesma fonte
    # do aspx-renewal). Não precisa cookies em texto-claro: lê do Supabase.
    env_file:
      - backend.env
    environment:
      SPX_BASE_URL: ${SPX_BASE_URL:-https://logistics.myagencyservice.com.br}
      # SPX_VERSION extraído de qualquer request do portal (header version).
      # Muda a cada deploy do portal SPX (~mensal) — atualizar manualmente.
      SPX_VERSION: ${SPX_VERSION:-agencyportal:20260325}
      SPX_AGENCY_ID: ${SPX_AGENCY_ID:-297}
      SPX_SIDECAR_HOST: "0.0.0.0"
      SPX_SIDECAR_PORT: "8766"
      PYTHONUNBUFFERED: "1"
    mem_limit: 256m
    mem_reservation: 64m
    cpus: 0.50
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # /spx/status valida cookies no Supabase (read-only) — não consome SPX.
      test: ["CMD", "curl", "-fs", "http://localhost:8766/spx/status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    expose:
      - "8766"
    depends_on:
      aspx-renewal:
        condition: service_started

  # ── ASPX driver sync + self-heal da sessão SPX (persistent container) ─────
  # Sincroniza aspx_drivers E mantém a sessão SPX viva sozinha:
  #   1. spx-bot keep-alive — rotação de cookie a cada chamada válida (gentil)
  #   2. ESTE container — login headless Playwright (perfil persistente) quando a
  #      sessão morre de vez. O login funciona na VPS (sem captcha no IP do
  #      servidor) com os seletores corretos do SSO. 100% automático, sem humano.
  aspx-renewal:
    build:
      context: ./scripts/aspx-sync
      dockerfile: Dockerfile
    image: lamonica-aspx-renewal:latest
    restart: unless-stopped
    networks:
      - lamonica-net
    env_file:
      - backend.env
    environment:
      # 1 = self-heal: faz login headless e grava no Supabase quando o cookie morre.
      ASPX_ALLOW_PLAYWRIGHT_LOGIN: "1"
      # Perfil persistente do Chromium (dispositivo confiável → menos risco de captcha).
      SPX_PW_PROFILE_DIR: /data/pw_profile
      PYTHONUNBUFFERED: "1"
    volumes:
      # Perfil do navegador persiste entre deploys (mantém a sessão/dispositivo).
      - spx_pw_profile:/data
    # Chromium headless é caro em RAM no momento do login. 768m dá folga.
    mem_limit: 768m
    mem_reservation: 192m
    cpus: 0.50
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Evolution API (gateway WhatsApp p/ driver-outreach) — OPT-IN ─────────
  # Só sobe com: docker compose --profile outreach up -d evolution-api
  # Interno (sem Traefik). Requer EVOLUTION_API_TOKEN no backend.env e um
  # pareamento único via QR. STORE_*=false → zero persistência de mensagens.
  evolution-api:
    # Versão PINADA (não usar :latest) e org ATUAL do projeto: a org antiga
    # (atendai/) restringiu os pulls públicos — registry devolve 401 até com
    # token anônimo (foi o "pull access denied" na VPS). A imagem oficial
    # vive em evoapicloud/ agora; v2.3.7 = última estável verificada.
    image: evoapicloud/evolution-api:v2.3.7
    container_name: lamonica-evolution-api
    restart: unless-stopped
    profiles: ["outreach"]
    networks:
      - lamonica-net
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_TOKEN:-}
      SERVER_URL: http://evolution-api:8080
      # Evolution v2 EXIGE banco (o DATABASE_ENABLED do v1 não existe mais).
      # Postgres DEDICADO e isolado (não o Supabase da aplicação). A instância/
      # sessão é persistida (o pareamento por QR sobrevive a restart); mensagens/
      # contatos/chats NÃO são guardados no Evolution (privacidade — o app tem a
      # própria whatsapp_messages e o webhook entrega os eventos independente disso).
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:${EVOLUTION_DB_PASSWORD:-}@evolution-postgres:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: lamonica_evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "false"
      DATABASE_SAVE_MESSAGE_UPDATE: "false"
      DATABASE_SAVE_DATA_CONTACTS: "false"
      DATABASE_SAVE_DATA_CHATS: "false"
      DATABASE_SAVE_DATA_LABELS: "false"
      DATABASE_SAVE_DATA_HISTORIC: "false"
      # Cache local (sem Redis) — suficiente para instância única.
      CACHE_REDIS_ENABLED: "false"
      CACHE_LOCAL_ENABLED: "true"
      LOG_LEVEL: ERROR
      DEL_INSTANCE: "false"
    volumes:
      - evolution_data:/evolution/instances
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 0.75
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      evolution-postgres:
        condition: service_healthy

  # ── Postgres dedicado do Evolution API v2 (OPT-IN) ───────────────────────
  # v2 exige banco. Isolado do Supabase da aplicação; interno, SEM portas
  # expostas — só o evolution-api acessa na lamonica-net. Só sobe com o
  # profile outreach. Requer EVOLUTION_DB_PASSWORD no .env da raiz.
  evolution-postgres:
    image: postgres:16-alpine
    container_name: lamonica-evolution-postgres
    restart: unless-stopped
    profiles: ["outreach"]
    networks:
      - lamonica-net
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${EVOLUTION_DB_PASSWORD:-}
      POSTGRES_DB: evolution
    volumes:
      - evolution_pg_data:/var/lib/postgresql/data
    mem_limit: 256m
    mem_reservation: 64m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 5

# ── Volumes ───────────────────────────────────────────────────────────────
volumes:
  cadastro_anexos:
    name: lamonica_cadastro_anexos
  spx_pw_profile:
    name: lamonica_spx_pw_profile
  evolution_data:
    name: lamonica_evolution_data
  evolution_pg_data:
    name: lamonica_evolution_pg_data

# ── Networks ──────────────────────────────────────────────────────────────
networks:
  lamonica-net:
    name: lamonica-net
    driver: bridge
  platform_public:
    external: true
    name: platform_public
  platform_monitoring:
    external: true
    name: platform_monitoring
