name: CI

on:
  pull_request:
    branches:
      - main
  merge_group:
  push:
    branches:
      - main

# Cancela runs antigos em PRs quando há push novo na mesma branch
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: Lint + Typecheck + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      # ── Install ──────────────────────────────────────────────────────────
      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      # ── Lint ─────────────────────────────────────────────────────────────
      - name: Lint frontend
        run: npm run lint --if-present
        working-directory: frontend

      - name: Lint backend
        run: npm run lint --if-present
        working-directory: backend

      # ── Typecheck ────────────────────────────────────────────────────────
      - name: Typecheck frontend
        run: npm run typecheck --if-present
        working-directory: frontend

      - name: Typecheck backend
        run: npm run typecheck --if-present
        working-directory: backend

      # ── Test ─────────────────────────────────────────────────────────────
      - name: Test frontend
        run: npm test --if-present
        working-directory: frontend
        env:
          TZ: America/Sao_Paulo
          # Vitest carrega modulos reais via vi.importActual — supabase client exige URL/KEY em module init.
          VITE_SUPABASE_URL: https://ci.placeholder.invalid
          VITE_SUPABASE_PUBLISHABLE_KEY: ci-placeholder
          VITE_API_BASE_URL: https://ci.placeholder.invalid

      - name: Test backend
        run: npm test --if-present
        working-directory: backend
        env:
          TZ: America/Sao_Paulo

      # ── Build ────────────────────────────────────────────────────────────
      - name: Build frontend
        run: npm run build --if-present
        working-directory: frontend
        env:
          # Build de CI usa placeholders — produção injeta valores reais no deploy.yml
          VITE_SUPABASE_URL: https://ci.placeholder.invalid
          VITE_SUPABASE_PUBLISHABLE_KEY: ci-placeholder
          VITE_API_BASE_URL: https://ci.placeholder.invalid

      - name: Build backend
        run: npm run build --if-present
        working-directory: backend

  # ─────────────────────────────────────────────────────────────────────────
  # bots/ — sidecars Python (DC-111 / Sprint 1 / DC-119)
  # Lint Python com ruff + smoke import test (pytest aceita exit 0 mesmo sem
  # suite). Sprint 2 substitui pytest opcional por suite real.
  # ─────────────────────────────────────────────────────────────────────────
  bots-check:
    name: Bots — ruff + pytest smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff + pytest
        run: pip install ruff pytest

      - name: Lint bots/ with ruff
        run: ruff check bots/

      - name: Install angelira deps + smoke import
        run: |
          pip install -r requirements.txt
          python -c "import sys; sys.path.insert(0, 'backend'); from main import app; print('angelira OK:', app.title)"
          pytest -q || echo "no tests yet — ok"
        working-directory: bots/angelira

      - name: Install unificada system deps (libcairo para svglib/pycairo)
        run: sudo apt-get install -y libcairo2-dev libgirepository1.0-dev pkg-config

      - name: Install unificada deps + smoke import
        run: |
          pip install -r requirements.txt
          python -c "import sys; sys.path.insert(0, 'backend'); from main import app; print('unificada OK:', app.title)"
          pytest -q || echo "no tests yet — ok"
        working-directory: bots/unificada
