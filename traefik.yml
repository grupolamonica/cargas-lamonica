# traefik.yml — Platform-level Traefik static config
# Lives at /opt/platform/traefik/traefik.yml on VPS.
# This file in the repo is the source of truth — deploy manually or via CI.
#
# IP-only mode: HTTP only on port 80. No TLS until a domain is configured.
# Domain mode: uncomment the certificatesResolvers section and websecure entrypoint.

global:
  checkNewVersion: false
  sendAnonymousUsage: false

# ── API / Dashboard ────────────────────────────────────────────────────────
# Dashboard accessible at http://localhost:8080 (bound to 127.0.0.1 only)
api:
  dashboard: true
  insecure: false

# ── Entry Points ──────────────────────────────────────────────────────────
entryPoints:
  web:
    address: ":80"
    # Uncomment when domain is live to auto-redirect HTTP → HTTPS:
    # http:
    #   redirections:
    #     entryPoint:
    #       to: websecure
    #       scheme: https
    #       permanent: true

  websecure:
    address: ":443"
    # Uncomment when domain is live:
    # http:
    #   tls:
    #     certResolver: letsencrypt

# ── Certificate Resolvers (uncomment when domain is live) ─────────────────
# certificatesResolvers:
#   letsencrypt:
#     acme:
#       email: "antonio.magalhaes@grupolamonica.com.br"
#       storage: /etc/traefik/acme/acme.json
#       httpChallenge:
#         entryPoint: web

# ── Providers ─────────────────────────────────────────────────────────────
providers:
  docker:
    # Only expose containers explicitly labelled traefik.enable=true
    exposedByDefault: false
    # Network used to reach containers (must match labels: traefik.docker.network)
    network: platform_public
    watch: true

# ── Logging ───────────────────────────────────────────────────────────────
log:
  level: INFO

accessLog: {}

# ── Metrics ───────────────────────────────────────────────────────────────
metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true
    addRoutersLabels: true
