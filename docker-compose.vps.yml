# docker-compose.vps.yml — VPS overrides for Lamonica Cargas
#
# Usage (IP-only, no domain):
#   docker compose -f docker-compose.yml -f docker-compose.vps.yml up -d
#
# Usage (with domain + TLS, after DNS is live):
#   DOMAIN=lamonica.grupolamonica.com.br \
#   docker compose -f docker-compose.yml -f docker-compose.vps.yml -f docker-compose.domain.yml up -d
#
# Requires on VPS:
#   - backend.env in this directory (real credentials)
#   - Platform Traefik running: /opt/platform/traefik/
#   - Docker networks: platform_public, platform_monitoring (created by platform)

services:

  frontend:
    build:
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-}
        VITE_API_BASE_URL: ""
    # No ports: Traefik handles edge traffic on port 80/443

  backend:
    env_file:
      - backend.env
    # No ports exposed directly: Traefik routes /api/* here

  # ── Prometheus (metrics scraping) ─────────────────────────────────────────
  # Requires: METRICS_ENABLED=true + METRICS_TOKEN in backend.env
  # Grafana available at https://grafana.${DOMAIN} after DNS is live.
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: lamonica-prometheus
    restart: unless-stopped
    networks:
      - lamonica-net
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.listen-address=:9090"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.2"

  # ── Grafana (dashboards) ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: lamonica-grafana
    restart: unless-stopped
    networks:
      - lamonica-net
      - platform_public
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-changeme}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://grafana.${DOMAIN:-localhost}"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=platform_public"
      - "traefik.http.routers.lmc-grafana.rule=Host(`grafana.${DOMAIN}`)"
      - "traefik.http.routers.lmc-grafana.entrypoints=websecure"
      - "traefik.http.routers.lmc-grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.lmc-grafana.loadbalancer.server.port=3000"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.2"

  # ── Watchtower: DISABLED — deploy is handled exclusively by GitHub Actions deploy.yml
  # Auto-pull every 60s caused rollouts of broken images without smoke tests.
  # To re-enable temporarily for a manual deploy cycle, comment this block out
  # and run: docker compose ... up -d watchtower
  # watchtower:
  #   image: containrrr/watchtower:latest
  #   restart: unless-stopped
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #     - /root/.docker/config.json:/config.json:ro
  #   environment:
  #     WATCHTOWER_POLL_INTERVAL: "60"
  #     WATCHTOWER_CLEANUP: "true"
  #     WATCHTOWER_INCLUDE_RESTARTING: "true"
  #     WATCHTOWER_LABEL_ENABLE: "true"
  #   networks:
  #     - lamonica-net

volumes:
  prometheus_data:
    name: lamonica_prometheus_data
  grafana_data:
    name: lamonica_grafana_data
