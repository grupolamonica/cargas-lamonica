# docker-compose.vps.yml — VPS overrides for Lamonica Cargas
#
# Usage (IP-only, no domain):
#   docker compose -f docker-compose.yml -f docker-compose.vps.yml up -d
#
# Usage (with domain + TLS, after DNS is live):
#   DOMAIN=lamonica.grupolamonica.com.br \
#   docker compose -f docker-compose.yml -f docker-compose.vps.yml -f docker-compose.domain.yml up -d
#
# Requires on VPS:
#   - backend.env in this directory (real credentials)
#   - Platform Traefik running: /opt/platform/traefik/
#   - Docker networks: platform_public, platform_monitoring (created by platform)

services:

  frontend:
    build:
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-}
        VITE_API_BASE_URL: ""
    # No ports: Traefik handles edge traffic on port 80/443
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  backend:
    env_file:
      - backend.env
    # No ports exposed directly: Traefik routes /api/* here
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ── Watchtower: auto-pull GHCR images and restart on new :latest pushes ──────
  # CI pushes ghcr.io/…:latest → Watchtower polls every 60s → rolling restart.
  # Eliminates SSH as a hard deploy requirement for future releases.
  # Auth: mounts /root/.docker/config.json with GHCR credentials (run once:
  #   echo TOKEN | docker login ghcr.io -u antoniocesar-dev --password-stdin
  # where TOKEN is a GitHub PAT with read:packages scope).
  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    environment:
      WATCHTOWER_POLL_INTERVAL: "60"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
    networks:
      - lamonica-net
