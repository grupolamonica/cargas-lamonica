# docker-compose.vps.yml — VPS overrides for Lamonica Cargas
#
# Usage (IP-only, no domain):
#   docker compose -f docker-compose.yml -f docker-compose.vps.yml up -d
#
# Usage (with domain + TLS, after DNS is live):
#   DOMAIN=lamonica.grupolamonica.com.br \
#   docker compose -f docker-compose.yml -f docker-compose.vps.yml -f docker-compose.domain.yml up -d
#
# Requires on VPS:
#   - backend.env in this directory (real credentials)
#   - Platform Traefik running: /opt/platform/traefik/
#   - Docker networks: platform_public, platform_monitoring (created by platform)

services:

  frontend:
    build:
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-}
        VITE_API_BASE_URL: ""
    # No ports: Traefik handles edge traffic on port 80/443

  backend:
    env_file:
      - backend.env
    # No ports exposed directly: Traefik routes /api/* here

  # ── Watchtower: DISABLED — deploy is handled exclusively by GitHub Actions deploy.yml
  # Auto-pull every 60s caused rollouts of broken images without smoke tests.
